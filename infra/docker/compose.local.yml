services:
  admin-api:
    build:
      context: ../../services/admin-api
      dockerfile: Dockerfile
    container_name: skillnea-admin-api
    env_file:
      - ../../services/admin-api/.env
    environment:
      SERVICE_VERSION: 0.1.0
    ports:
      - "8080:8080"

  admin-web:
    build:
      context: ../../apps/admin-web
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_BASE_URL: /api
    container_name: skillnea-admin-web
    depends_on:
      - admin-api
    ports:
      - "5173:80"
