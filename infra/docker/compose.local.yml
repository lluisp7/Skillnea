services:
  admin-api:
    build:
      context: ../../services/admin-api
      dockerfile: Dockerfile
    container_name: skillnea-admin-api
    environment:
      APPS_SCRIPT_BASE_URL: ${APPS_SCRIPT_BASE_URL:-}
      SERVICE_VERSION: 0.1.0
    ports:
      - "8080:8080"

  admin-web:
    build:
      context: ../../apps/admin-web
      dockerfile: Dockerfile
    container_name: skillnea-admin-web
    environment:
      VITE_ADMIN_API_BASE_URL: http://localhost:8080
      VITE_APP_VERSION: 0.1.0
    depends_on:
      - admin-api
    ports:
      - "5173:5173"
